<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sol Softworks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: #ffffff;
    }
    .tagline {
      font-size: 1rem;
      color: #888;
      margin-bottom: 48px;
      letter-spacing: 1px;
    }
    .apps {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 400px;
    }
    .app-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    .app-card:hover {
      border-color: #555;
      transform: translateY(-2px);
    }
    .app-name {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #ffffff;
    }
    .app-desc {
      font-size: 0.9rem;
      color: #888;
      line-height: 1.5;
    }
    .app-badge {
      display: inline-block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #B8860B;
      background: #1f1a0f;
      border: 1px solid #B8860B;
      border-radius: 4px;
      padding: 2px 8px;
      margin-bottom: 10px;
    }
    footer {
      position: fixed;
      bottom: 24px;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>

  <div class="logo">Sol Softworks</div>
  <div class="tagline">Independent software, thoughtfully made.</div>

  <div class="apps">
    <div class="app-card">
      <div class="app-badge">Android</div>
      <div class="app-name">✦ Gospel Guide</div>
      <div class="app-desc">AI-powered Bible guidance. Bring your burdens, find wisdom in scripture.</div>
    </div>
  </div>

  <footer>&copy; 2026 Sol Softworks</footer>

</body>
</html>
